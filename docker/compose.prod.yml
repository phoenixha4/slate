services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: prod
    env_file:
      - path: ../.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required for production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      READ_TIMEOUT: ${READ_TIMEOUT:-15s}
      WRITE_TIMEOUT: ${WRITE_TIMEOUT:-30s}
      IDLE_TIMEOUT: ${IDLE_TIMEOUT:-60s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      READINESS_TIMEOUT: ${READINESS_TIMEOUT:-2s}
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
